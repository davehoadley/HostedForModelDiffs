name: Generate Test and Coverage Artifacts on GitHub-Hosted Runner
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  my-job:
    name: Diffs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
          release: R2024b
          products: |
            Simulink
            Simulink_Report_Generator
            Stateflow
            Simulink_Check
            CI/CD_Automation_for_Simulink_Check
      - name: Check MATLAB
        uses: matlab-actions/run-command@v2
        with:
          command: disp("hello Dave")
      - name: Install git
        run: |
            echo "Installing git..."
            sudo apt-get install git
            echo "done!"
      - name: 
      - name: Check project source control integration
        uses: matlab-actions/run-command@v2
        with:
          command: disp(settings().matlab.sourcecontrol.EnableSourceControl); disp(gitrepo); cp = openProject(pwd); disp(cp.SourceControlIntegration)
