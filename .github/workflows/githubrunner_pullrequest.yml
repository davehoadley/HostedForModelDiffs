name: PullRequest - Diff to Ancestor + PR Preview Pages

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

env:
  PRODUCT_LIST: MATLAB Simulink Stateflow MATLAB_Coder Simulink_Coder Embedded_Coder

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-preview:
    name: Generate diff report and deploy PR preview
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MATLAB
        if: github.event.action != 'closed'
        uses: matlab-actions/setup-matlab@v2
        with:
          products: ${{ env.PRODUCT_LIST }}
          cache: true

      - name: Start display server
        if: github.event.action != 'closed'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Compare Models to Ancestors (generate HTML into diffreports/)
        if: github.event.action != 'closed'
        uses: matlab-actions/run-command@v1
        with:
          command: |
            branch = "dev";
            diffGitHub_pullrequest(branch);

      - name: Verify diffreports output exists
        if: github.event.action != 'closed'
        run: |
          echo "Listing diffreports:"
          ls -la diffreports || true
          test -d diffreports

      - name: Upload comparison reports as workflow artifacts (optional)
        if: github.event.action != 'closed'
        uses: actions/upload-artifact@v4
        with:
          name: diffreports
          path: diffreports/**

      - name: Deploy (or clean up) PR preview to GitHub Pages branch
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: diffreports
          preview-branch: gh-pages
          umbrella-dir: pr-preview

  generate-code:
    name: Generate code from Process Advisor built-in task
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MATLAB
        if: github.event.action != 'closed'
        uses: matlab-actions/setup-matlab@v2
        with:
          products: ${{ env.PRODUCT_LIST }}
          cache: true

      - name: Start display server
        if: github.event.action != 'closed'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Code Generation
        if: github.event.action != 'closed'
        uses: matlab-actions/run-command@v1
        with:
          command: |
            runprocess

